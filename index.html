<!-- MAIN NOTES APP -->
<div class="main">
  <h2> 🗒Notes🗒 </h2>

  <div class="input-area">
    <input id="noteInput" placeholder="Write a note..." />
    <button onclick="addNote()">Add</button>
  </div>

  <div id="notesList"></div>
</div>

<script>
  // Load saved notes
  let notes = JSON.parse(localStorage.getItem("geebob_notes")) || [];

  function saveNotes() {
    localStorage.setItem("geebob_notes", JSON.stringify(notes));
  }

  function renderNotes() {
    const list = document.getElementById("notesList");
    list.innerHTML = "";

    notes.forEach((note, index) => {
      const div = document.createElement("div");
      div.className = "note";

      div.innerHTML = `
        <div class="note-text">${note}</div>
        <button class="delete" onclick="deleteNote(${index})">X</button>
      `;

      list.appendChild(div);
    });
  }

  function addNote() {
    const input = document.getElementById("noteInput");
    if (!input.value.trim()) return;

    notes.push(input.value);
    input.value = "";

    saveNotes();
    renderNotes();
  }

  function deleteNote(index) {
    notes.splice(index, 1);
    saveNotes();
    renderNotes();
  }

  renderNotes();
</script>
