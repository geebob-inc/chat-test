<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Geebob-Inc Live Chat</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      display: flex;
      height: 100vh;
    }

    .sidebar {
      width: 300px;
      background: #0f0f0f;
      color: white;
      padding: 15px;
      overflow-y: auto;
    }

    .sidebar a {
      display: block;
      color: #4fc3f7;
      margin: 10px 0;
      text-decoration: none;
    }

    .chat {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #f4f4f4;
    }

    .messages {
      flex: 1;
      padding: 10px;
      overflow-y: auto;
    }

    .message {
      background: white;
      margin: 8px 0;
      padding: 10px;
      border-radius: 6px;
    }

    .input {
      display: flex;
      padding: 10px;
      background: #ddd;
    }

    input {
      flex: 1;
      padding: 10px;
    }

    button {
      margin-left: 8px;
      padding: 10px;
    }
  </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>Geebob-Inc Pages</h2>

  <a href="https://geebob-inc.github.io/UFO_Arena-Combat/" target="_blank">Arena UFO Combat</a>
  <a href="https://geebob-inc.github.io/UFO_Arena-Combat-for-mobile/" target="_blank">Arena UFO Combat mobile</a>
  <a href="https://geebob-inc.github.io/UFO_Arena-Combat-2-players-verison/" target="_blank">two player Arena UFO Combat</a>
  <a href="https://geebob-inc.github.io/text/" target="_blank">Text Bouncer</a>
  <a href="https://geebob-inc.github.io/profile-generator/" target="_blank">Character Generator</a>
  <a href="https://geebob-inc.github.io/the-Saint-Web/" target="_blank">Saint Web</a>
  <a href="https://geebob-inc.github.io/coupon-price/" target="_blank">Coupon Calculator</a>
</div>

<!-- CHAT -->
<div class="chat">
  <div id="messages" class="messages"></div>

  <div class="input">
    <input id="msg" placeholder="Type message..." />
    <button onclick="send()">Send</button>
  </div>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
  // 🔥 PUT YOUR FIREBASE CONFIG HERE
  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_PROJECT.firebaseapp.com",
    databaseURL: "https://YOUR_PROJECT.firebaseio.com",
    projectId: "YOUR_PROJECT",
    storageBucket: "YOUR_PROJECT.appspot.com",
    messagingSenderId: "XXXX",
    appId: "XXXX"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database().ref("chat");

  const messagesDiv = document.getElementById("messages");

  function send() {
    const input = document.getElementById("msg");
    if (!input.value.trim()) return;

    db.push({
      text: input.value,
      time: Date.now()
    });

    input.value = "";
  }

  db.on("child_added", (snapshot) => {
    const msg = snapshot.val();

    const div = document.createElement("div");
    div.className = "message";
    div.textContent = msg.text;

    messagesDiv.appendChild(div);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
  });

  document.getElementById("msg").addEventListener("keypress", (e) => {
    if (e.key === "Enter") send();
  });
</script>

</body>
</html>
